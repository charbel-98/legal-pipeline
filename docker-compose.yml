services:
  mongodb:
    image: mongo:7
    container_name: legal-pipeline-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_APP_DATABASE: legal_pipeline
      MONGO_APP_USERNAME: legal_pipeline_user
      MONGO_APP_PASSWORD: legal_pipeline_pass
    volumes:
      - ./mongo_data:/data/db
      - ./docker/mongodb/init:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio:latest
    container_name: legal-pipeline-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: legal-pipeline-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/landing-zone;
      /usr/bin/mc mb --ignore-existing local/processed-zone;
      /usr/bin/mc anonymous set private local/landing-zone;
      /usr/bin/mc anonymous set private local/processed-zone;
      exit 0;
      "
