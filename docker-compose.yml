services:
  mongodb:
    image: mongo:7
    container_name: legal-pipeline-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_APP_DATABASE: ${MONGO_APP_DATABASE}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    volumes:
      - ./mongo_data:/data/db
      - ./docker/mongodb/init:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio:latest
    container_name: legal-pipeline-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: legal-pipeline-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo 'waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/${MINIO_LANDING_BUCKET};
      /usr/bin/mc mb --ignore-existing local/${MINIO_PROCESSED_BUCKET};
      /usr/bin/mc anonymous set private local/${MINIO_LANDING_BUCKET};
      /usr/bin/mc anonymous set private local/${MINIO_PROCESSED_BUCKET};
      exit 0;
      "
